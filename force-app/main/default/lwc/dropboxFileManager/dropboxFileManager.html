<template>
   <lightning-spinner alternative-text="Loading" size="medium" variant="brand" lwc:if={isLoading}></lightning-spinner>
    <lightning-card variant="Narrow" title="Dropbox File Manager" icon-name="standard:file">
        <div>
            <span>Upload file for {name}</span>
            <lightning-file-upload
                label="Upload File"
                name="fileUploader"
                record-id={recordId}
                onuploadfinished={handleUploadFinished}
            >
            </lightning-file-upload>
        </div>
    </lightning-card>
</template>
